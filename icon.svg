<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#eef2f6"/>
    </linearGradient>
    <radialGradient id="glowB" cx="0.34" cy="0.26" r="0.6">
      <stop offset="0" stop-color="#cfe0f0" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#cfe0f0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowO" cx="0.72" cy="0.8" r="0.55">
      <stop offset="0" stop-color="#ffd9b8" stop-opacity="0.7"/>
      <stop offset="1" stop-color="#ffd9b8" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="shield" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#e9eef4"/>
    </linearGradient>
    <linearGradient id="navy" x1="0.2" y1="0" x2="0.6" y2="1">
      <stop offset="0" stop-color="#3a78ad"/>
      <stop offset="0.5" stop-color="#1d557f"/>
      <stop offset="1" stop-color="#0e3350"/>
    </linearGradient>
    <linearGradient id="orange" x1="0.8" y1="0" x2="0.4" y2="1">
      <stop offset="0" stop-color="#ffa24d"/>
      <stop offset="0.5" stop-color="#ef7a2f"/>
      <stop offset="1" stop-color="#d1451a"/>
    </linearGradient>
    <filter id="sh" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="7" stdDeviation="10" flood-color="#12314c" flood-opacity="0.22"/>
    </filter>
    <filter id="ish" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#0e2c46" flood-opacity="0.30"/>
    </filter>
  </defs>

  <!-- background -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <rect width="512" height="512" fill="url(#glowB)"/>
  <rect width="512" height="512" fill="url(#glowO)"/>

  <!-- shield -->
  <g filter="url(#sh)">
    <path d="M 176,104 L 336,104 Q 384,104 384,152 L 384,296
             Q 384,336 350,360 L 256,430 L 162,360
             Q 128,336 128,296 L 128,152 Q 128,104 176,104 Z"
          fill="url(#shield)" stroke="#dfe6ee" stroke-width="2"/>
  </g>

  <!-- faceted chevron mark -->
  <g filter="url(#ish)">
    <polygon points="256,150 170,300 214,300 256,214" fill="url(#navy)"/>
    <polygon points="256,150 342,300 298,300 256,214" fill="url(#orange)"/>
    <!-- inner bevel shadows -->
    <polygon points="256,150 256,214 214,300 232,300" fill="#0d2f4a" opacity="0.55"/>
    <polygon points="256,150 256,214 298,300 280,300" fill="#b23c14" opacity="0.5"/>
    <!-- centre crease highlight -->
    <polygon points="256,150 260,157 256,214 252,157" fill="#ffd451"/>
  </g>

  <!-- wordmark -->
  <text x="256" y="392" text-anchor="middle"
        font-family="Helvetica, Arial, 'DejaVu Sans', sans-serif"
        font-weight="bold" font-size="40" letter-spacing="1" fill="#123a5a">70.3</text>
</svg>