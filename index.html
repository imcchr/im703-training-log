  }
  .stat {
    background: white; border: 1px solid #e1e4e8;

  }
  .stat-val { font-size: 1.35rem; font-weight: 700; }
  .stat-lbl { font-size: 0.72rem; color: #586069; margin-top: 3px; }

  /* Filter pills */
  .filter-bar {
    display: flex; gap: 8px; flex-wrap: wrap;
    margin-bottom: 18px; align-items: center;
  }
  .filter-bar strong {
    font-size: 0.78rem; color: #586069; margin-right: 4px;
  }
  .pill {
    border: 1px solid #d0d7de; background: white;
    border-radius: 20px; padding: 5px 14px;
    font-size: 0.82rem; cursor: pointer;
    font-weight: 500; color: #24292e;
    transition: all 0.15s;
    display: flex; align-items: center; gap: 6px;
  }
  .pill:hover { background: #f6f8fa; }
  .pill.active { background: #24292e; color: white; border-color: #24292e; }
  .pill .swatch {
    width: 9px; height: 9px; border-radius: 50%; display: inline-block;
  }
  .sw-swim { background: #2980B9; }
  .sw-bike { background: #E67500; }
  .sw-run  { background: #27AE60; }
  .sw-lift { background: #8E44AD; }

  .week-card {
    background: white; border: 1px solid #e1e4e8;
    border-radius: 8px; margin-bottom: 12px; overflow: hidden;
  }
  .week-head {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 16px; cursor: pointer;
    background: white; border-bottom: 1px solid transparent;
    transition: background 0.1s;
  }
  .week-head:hover { background: #f6f8fa; }
  .week-card.open .week-head { border-bottom-color: #e1e4e8; }
  .phase-badge {
    font-size: 0.7rem; font-weight: 700; color: white;
    padding: 3px 9px; border-radius: 4px;
  }
  .phase-base       { background: #0969da; }
  .phase-recovery   { background: #2da44e; }
  .phase-build      { background: #e36209; }
  .phase-peak       { background: #cf222e; }
  .phase-benchmark  { background: #6f42c1; }
  .phase-transition { background: #586069; }
  .week-title { font-weight: 600; font-size: 0.96rem; }
  .week-dates { color: #586069; font-size: 0.82rem; }
  .week-spacer { flex: 1; }
  .week-meta {
    display: flex; align-items: center; gap: 10px;
    color: #586069; font-size: 0.78rem;
  }
  .week-score {
    font-weight: 700; padding: 3px 9px; border-radius: 4px;
    color: white; font-size: 0.78rem;
  }
  .ws-high { background: #1a7f37; }
  .ws-mid  { background: #e36209; }
  .ws-low  { background: #c0392b; }
  .caret {
    font-size: 0.7rem; color: #586069; transition: transform 0.2s;
  }
  .week-card.open .caret { transform: rotate(90deg); }

  .week-body { display: none; padding: 4px 0 8px; }
  .week-card.open .week-body { display: block; }

  .session {
    display: grid;
    grid-template-columns: 90px 1fr auto 44px;
    gap: 12px; align-items: center;
    padding: 9px 16px 9px 12px;
    border-left: 4px solid #ccc;
    margin: 0 12px;
    border-bottom: 1px solid #f0f0f0;

  .session:last-child { border-bottom: none; }
  .session.disc-swim { border-left-color: #2980B9; }
  .session.disc-bike { border-left-color: #E67500; }
  .session.disc-run  { border-left-color: #27AE60; }
  .session.disc-lift { border-left-color: #8E44AD; }

  }
  .sess-day { font-size: 0.68rem; color: #8c959f; }

  .sess-title {
    font-weight: 600; font-size: 0.88rem;

  }
  .sess-detail {
    font-size: 0.76rem; color: #586069;
    margin-top: 2px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;

    font-size: 0.68rem; font-weight: 700;

  .tag-swim { background: #e1f0fa; color: #2980B9; }
  .tag-bike { background: #fdebd9; color: #b85a00; }
  .tag-run  { background: #d8f3df; color: #1a7f37; }
  .tag-lift { background: #ecdcfa; color: #6f42c1; }

    width: 36px; height: 36px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 0.92rem; color: white;
  }

  .sc-7, .sc-8  { background: #40c463; color: #14361f; }
  .sc-5, .sc-6  { background: #9be9a8; color: #14361f; }
  .sc-3, .sc-4  { background: #f0a500; }
  .sc-1, .sc-2  { background: #e05c2a; }
  .sc-0         { background: #c0392b; }

  .session.hidden { display: none; }
  .week-card.empty { display: none; }

  #logTooltip {
    position: fixed; display: none; z-index: 1000;
    background: #24292e; color: white;
    padding: 9px 12px; border-radius: 6px;

    text-align: center; padding: 28px;
    color: #586069; font-size: 0.85rem;
    border: 2px dashed #e1e4e8; border-radius: 8px;
  }

    .session { grid-template-columns: 70px 1fr 38px; }
    .sess-tag { display: none; }

const DOW = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
function dayOfWeek(iso) {
  const [y,m,d] = iso.split('-').map(Number);
  return DOW[new Date(y, m-1, d).getDay()];
}
function monthDay(iso) {
  const [y,m,d] = iso.split('-').map(Number);
  return `${m}/${d}`;
}

function wsClass(score) {
  if (score === null || score === undefined) return '';
  if (score >= 80) return 'ws-high';
  if (score >= 60) return 'ws-mid';
  return 'ws-low';
}

function phaseClass(p) {
  return 'phase-' + p.toLowerCase();
}

function renderStats() {
  let totalSessions = 0;
  let scoreSum = 0, scoreCount = 0;
  let discCount = { swim:0, bike:0, run:0, lift:0 };
  let weeklyScores = [];

  WEEKS_DATA.forEach(w => {
    if (w.score !== null && w.score !== undefined) weeklyScores.push(w.score);
    w.sessions.forEach(s => {
      totalSessions++;
      if (s.score > 0) { scoreSum += s.score; scoreCount++; }
      if (discCount[s.discipline] !== undefined) discCount[s.discipline]++;
    });
  });

  const avgWeekly = weeklyScores.length
    ? (weeklyScores.reduce((a,b) => a+b, 0) / weeklyScores.length).toFixed(0)
    : '-';
  const avgSession = scoreCount
    ? (scoreSum / scoreCount).toFixed(1)
    : '-';
  const bestWeek = weeklyScores.length ? Math.max(...weeklyScores) : '-';

  const stats = [
    { v: WEEKS_DATA.length, l: 'Weeks logged' },
    { v: totalSessions, l: 'Sessions' },
    { v: avgSession, l: 'Avg session' },
    { v: avgWeekly, l: 'Avg week' },
    { v: bestWeek, l: 'Best week' },
    { v: discCount.swim + 'S / ' + discCount.bike + 'B / ' + discCount.run + 'R / ' + discCount.lift + 'L',
      l: 'By discipline' },
  ];

  const root = document.getElementById('stats');
  stats.forEach(s => {
    const card = document.createElement('div');
    card.className = 'stat';
    card.innerHTML = `<div class="stat-val">${s.v}</div><div class="stat-lbl">${s.l}</div>`;
    root.appendChild(card);
  });
}

function renderWeeks() {
  const root = document.getElementById('weeks-container');

  if (WEEKS_DATA.length === 0) {
    root.innerHTML = '<div class="empty-state">No sessions logged yet. Run <code>python3 tools/build_training_log.py</code> after logging a session.</div>';
    return;
  }

  WEEKS_DATA.forEach((week, idx) => {
    const card = document.createElement('div');
    card.className = 'week-card' + (idx === 0 ? ' open' : '');  // newest expanded
    card.dataset.weekNum = week.num;

    const scoreBadge = week.score !== null && week.score !== undefined
      ? `<span class="week-score ${wsClass(week.score)}">${week.score}/100</span>`
      : '';

    card.innerHTML = `
      <div class="week-head">
        <span class="phase-badge ${phaseClass(week.phase)}">${week.phase}</span>
        <span class="week-title">Week ${week.num}</span>
        <span class="week-dates">${week.label}</span>
        <span class="week-spacer"></span>
        <span class="week-meta">${week.sessions.length} sessions</span>
        ${scoreBadge}
        <span class="caret">&#9656;</span>
      </div>
      <div class="week-body"></div>
    `;

    const body = card.querySelector('.week-body');
    week.sessions.forEach(s => {
      const row = document.createElement('div');
      row.className = `session disc-${s.discipline}`;
      row.dataset.disc = s.discipline;

      const detail = [s.actual, s.key_metric].filter(Boolean).join(' · ');
      const discLabel = s.discipline.charAt(0).toUpperCase() + s.discipline.slice(1);

      row.innerHTML = `
        <div>
          <div class="sess-date">${monthDay(s.date)}</div>
          <div class="sess-day">${dayOfWeek(s.date)}</div>
        </div>
        <div class="sess-main">
          <div class="sess-title">${s.title}</div>
          <div class="sess-detail">${detail || '-'}</div>
        </div>
        <span class="sess-tag tag-${s.discipline}">${discLabel}</span>
        <div class="score sc-${s.score}">${s.score}</div>
      `;

      // Tooltip on hover
      const logTooltip = document.getElementById('logTooltip');
      row.addEventListener('mousemove', (e) => {
        let html = `<strong>${s.title}</strong><br>`;
        html += `${dayOfWeek(s.date)} ${s.date} &middot; Score ${s.score}/10<br>`;
        if (s.actual) html += `<br><strong>Actual:</strong> ${s.actual}<br>`;
        if (s.key_metric) html += `<strong>Key:</strong> ${s.key_metric}<br>`;
        if (s.verdict) html += `<br>${s.verdict}`;
        logTooltip.innerHTML = html;
        logTooltip.style.display = 'block';
        const x = Math.min(e.clientX + 14, window.innerWidth - 340);
        const y = Math.min(e.clientY + 14, window.innerHeight - 200);
        logTooltip.style.left = x + 'px';
        logTooltip.style.top  = y + 'px';
      });
      row.addEventListener('mouseleave', () => {
        logTooltip.style.display = 'none';
      });

      body.appendChild(row);
    });

    // Toggle on header click
    card.querySelector('.week-head').addEventListener('click', () => {
      card.classList.toggle('open');
    });

    root.appendChild(card);
  });
}

function applyFilter(disc) {
  document.querySelectorAll('.pill').forEach(p => {
    p.classList.toggle('active', p.dataset.disc === disc);
  });

  document.querySelectorAll('.week-card').forEach(card => {
    let visible = 0;
    card.querySelectorAll('.session').forEach(row => {
      const show = (disc === 'all' || row.dataset.disc === disc);
      row.classList.toggle('hidden', !show);
      if (show) visible++;
    });
    card.classList.toggle('empty', visible === 0);
    // Auto-expand cards when filtering to a discipline
    if (disc !== 'all' && visible > 0) card.classList.add('open');
  });
}

document.querySelectorAll('.pill').forEach(p => {
  p.addEventListener('click', () => applyFilter(p.dataset.disc));
});

renderStats();
renderWeeks();
</script>
